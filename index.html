<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JULIO - Minimalist AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0d17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_8956.JPG">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</head>
<body>
    <div id="minimal-app">
        <!-- Status & Metadata -->
        <div class="info-panel">
            <div class="status-badge" id="status-text">ESCUCHANDO...</div>
            <div id="status-sub" style="font-size: 11px; color: #a0a0ff; opacity: 0.8; margin-bottom: 25px;">SISTEMA ONLINE</div>
            
            <div class="song-metadata">
                <h1 id="song-title">JULIO AI</h1>
                <p id="artist-name">Asistente de Voz</p>
            </div>
        </div>

        <!-- Assistant Sphere -->
        <div class="assistant-orb" id="mic-btn">
            <div class="orb-content">
                <img src="IMG_8956.JPG" alt="JULIO" id="avatar" class="avatar-sm">
                <div class="pulse-ring"></div>
            </div>
            <i class="fas fa-microphone" id="mic-icon"></i>
        </div>

        <div id="transcript-box" class="transcript-view">ESCUCHANDO...</div>

        <!-- Control Hub -->
        <div class="control-hub">
            <div class="visualizer-mini" id="visualizer">
                <div class="b"></div><div class="b"></div><div class="b"></div>
                <div class="b"></div><div class="b"></div><div class="b"></div>
            </div>

            <div class="compact-controls">
                <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause-btn" class="main-play"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
                <i class="fas fa-volume-up"></i>
            </div>

            <button id="install-btn" style="display:none; margin-top:10px; background: rgba(255,255,255,0.1); color:white; border:1px solid var(--primary-color); padding:15px; border-radius:15px; font-weight:700; width: 100%; cursor: pointer;">
                <i class="fas fa-mobile-alt"></i> INSTALAR APP (PWA)
            </button>
        </div>

        <!-- Hidden player -->
        <div id="youtube-player-container">
            <div id="youtube-player"></div>
        </div>
    </div>

    <!-- PWA Installation Modal -->
    <div id="install-modal">
        <div class="modal-content">
            <h2 id="modal-title">Instalar en Móvil</h2>
            <p id="install-instructions"></p>
            <button id="close-modal">ENTENDIDO</button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
