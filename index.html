<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JULIO - Minimalist AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0d17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="avatar.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</head>
<body>
    <div id="minimal-app">
        <!-- Floating Assistant Sphere -->
        <div class="assistant-orb" id="mic-btn">
            <div class="orb-content">
                <img src="avatar.png" alt="JULIO" id="avatar" class="avatar-sm">
                <div class="pulse-ring"></div>
            </div>
            <i class="fas fa-microphone" id="mic-icon"></i>
        </div>

        <!-- Dynamic Info Panel -->
        <div class="info-panel" id="info-panel">
            <div class="status-badge" id="status-text">ESCUCHANDO...</div>
            <div id="status-sub" style="font-size: 11px; color: #a0a0ff; opacity: 0.8; margin-bottom: 10px;">Pulsa el orbe para hablar</div>
            
            <div class="song-metadata">
                <h1 id="song-title">¿Qué escuchamos hoy?</h1>
                <p id="artist-name">Asistente JULIO</p>
            </div>
            
            <div class="visualizer-mini" id="visualizer">
                <div class="b"></div><div class="b"></div><div class="b"></div>
                <div class="b"></div><div class="b"></div><div class="b"></div>
            </div>

            <div class="compact-controls">
                <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause-btn" class="main-play"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
                <i class="fas fa-volume-up"></i>
            </div>

            <button id="install-btn" style="display:none; margin-top:20px; background: linear-gradient(to right, #00e0ff, #0072ff); color:#0b0d17; border:none; padding:12px 20px; border-radius:20px; font-weight:700; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 224, 255, 0.3);">
                <i class="fas fa-download"></i> DESCARGAR APP (APK)
            </button>
        </div>

        <!-- Hidden but active player -->
        <div id="youtube-player-container">
            <div id="youtube-player"></div>
        </div>

        <div id="transcript-box" class="transcript-view">ESCUCHANDO...</div>
        </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
