<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JULIO - Minimalist AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0d17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="IMG_8956.JPG">
    <!-- PWA primary link -->
    <link rel="manifest" href="manifest.json?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Initial Unlock Overlay -->
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, #1a1e3a 0%, #07090f 100%); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
        <div style="width:140px; height:140px; border-radius:50%; overflow:hidden; border:4px solid var(--primary-color); margin-bottom:30px; box-shadow:0 0 30px rgba(0,224,255,0.4); animation: breathe 3s infinite ease-in-out;">
            <img src="IMG_8956.JPG" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="color:white; font-size:32px; margin-bottom:10px;">JULIO AI</h1>
        <p style="color:#a0a0ff; margin-bottom:40px; font-size:16px;">Toca para activar el asistente de voz y la música.</p>
        <button id="activate-system" style="background:var(--primary-color); color:#07090f; border:none; padding:18px 45px; border-radius:30px; font-size:18px; font-weight:800; cursor:pointer; box-shadow:0 10px 25px rgba(0,224,255,0.3); letter-spacing:1px;">ACTIVAR SISTEMA</button>
    </div>

    <div id="minimal-app">
        <!-- Status & Metadata -->
        <div class="info-panel">
            <div class="status-badge" id="status-text">LISTO</div>
            <div id="status-sub" style="font-size: 11px; color: #a0a0ff; opacity: 0.8; margin-bottom: 25px;">ONLINE</div>
            
            <div class="song-metadata">
                <h1 id="song-title">SISTEMA LISTO</h1>
                <p id="artist-name">Asistente de Voz</p>
            </div>
        </div>

        <!-- Assistant Sphere -->
        <div class="assistant-orb" id="mic-btn">
            <div class="orb-content">
                <img src="IMG_8956.JPG" alt="JULIO" id="avatar" class="avatar-sm">
                <div class="pulse-ring"></div>
            </div>
            <i class="fas fa-microphone" id="mic-icon"></i>
        </div>

        <div id="transcript-box" class="transcript-view">ESPERANDO ORDEN...</div>

        <!-- Control Hub -->
        <div class="control-hub">
            <div class="visualizer-mini" id="visualizer">
                <div class="b"></div><div class="b"></div><div class="b"></div>
                <div class="b"></div><div class="b"></div><div class="b"></div>
            </div>

            <div class="compact-controls">
                <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause-btn" class="main-play"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
                <i class="fas fa-volume-up"></i>
            </div>

            <button id="install-btn" style="display:none; margin-top:10px; background: rgba(255,255,255,0.1); color:white; border:1px solid var(--primary-color); padding:15px; border-radius:15px; font-weight:700; width: 100%; cursor: pointer;">
                <i class="fas fa-mobile-alt"></i> INSTALAR APP (PWA)
            </button>
        </div>

        <!-- Hidden player -->
        <div id="youtube-player-container">
            <div id="youtube-player"></div>
        </div>
    </div>

    <!-- PWA Installation Modal -->
    <div id="install-modal" style="display:none;">
        <div class="modal-content">
            <h2 id="modal-title">Instalar en Móvil</h2>
            <p id="install-instructions"></p>
            <button id="close-modal">ENTENDIDO</button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
